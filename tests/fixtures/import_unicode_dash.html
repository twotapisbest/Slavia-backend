<!DOCTYPE html>
<html lang="pl">
<head><title>Wyniki — CMS z myślnikiem Unicode</title></head>
<body>
<article>
  <!-- „–” (U+2013) między rwaniem a podrzutem, jak na części stron CMS -->
  <p class="lead">Zawody 2026: Barbara Mazur 92–118 kg.</p>
  <table class="wyniki">
    <tbody>
      <!-- „—” (U+2014) w komórce tabeli -->
      <tr><td>Tomasz Lew</td><td>115—142</td></tr>
    </tbody>
  </table>
</article>
</body>
</html>
